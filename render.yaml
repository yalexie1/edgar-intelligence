services:
  - type: web
    name: edgar-rag-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    # The Pinecone index lives in the cloud — no local disk or rebuild needed.
    # Render free tier (512MB RAM) is sufficient since the index is remote.
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # set manually in the Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false        # set manually in the Render dashboard
      - key: PINECONE_API_KEY
        sync: false        # set manually in the Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # optional; defaults cover the Vercel frontend and localhost
      - key: ANSWER_MODEL
        value: claude-sonnet-4-6
      - key: PYTHON_VERSION
        value: 3.11.0
